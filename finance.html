<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Quinta da Aldeia — Finance</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    .year-sel{display:flex;gap:6px;flex-wrap:wrap}
    .yb{font-size:11px;letter-spacing:0.06em;text-transform:uppercase;padding:5px 14px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--ink3);cursor:pointer}
    .yb.active{background:var(--ink);color:var(--cream);border-color:var(--ink)}
    .chart-card{background:#fff;border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem 1.5rem;margin-bottom:1rem}
    .chart-title{font-size:11px;letter-spacing:0.08em;text-transform:uppercase;color:var(--ink3);margin-bottom:1rem}
    .bottom-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
    @media(max-width:600px){.bottom-grid{grid-template-columns:1fr}}
    .entry-row{display:flex;align-items:center;gap:10px;padding:9px 12px;border-bottom:1px solid var(--border);font-size:13px}
    .entry-row:last-child{border-bottom:none}
    .entry-row:hover{background:var(--cream2)}
    .entry-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
    .entry-info{flex:1;min-width:0}
    .entry-name{font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .entry-meta{font-size:11px;color:var(--ink3);margin-top:2px}
    .entry-amt{font-size:14px;font-weight:500;white-space:nowrap}
    .entry-amt.income{color:var(--green)}
    .entry-amt.expense{color:var(--red)}
    .cat-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
    .cat-row:last-child{border-bottom:none}
    .bar-wrap{height:5px;background:var(--cream3);border-radius:3px;width:100%;margin-top:3px}
    .bar-fill{height:5px;border-radius:3px}
    .demo-bar{background:#fffbea;border:1px solid #c8b840;border-radius:var(--radius);padding:10px 16px;margin-bottom:1rem;font-size:12px;color:#7a6800;display:none}
    .loading-overlay{display:none;position:fixed;inset:0;background:rgba(250,248,243,0.8);z-index:300;align-items:center;justify-content:center;font-size:14px;color:var(--ink3)}
    .loading-overlay.show{display:flex}
  </style>
</head>
<body>
<script src="auth.js"></script>
<div id="nav-placeholder"></div>
<div class="loading-overlay" id="loader">Saving…</div>
<div class="page">
  <div class="demo-bar" id="demo-bar">⚙️ Running in demo mode — data will not persist. Add your Apps Script URL to config.js to enable live storage.</div>
  <div class="page-header">
    <div class="page-header-left"><h1>Financial Dashboard</h1><p>Income and expenditure — Quinta da Aldeia</p></div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
      <div class="year-sel" id="year-sel"></div>
      <button class="btn btn-dark btn-sm" onclick="openModal()">+ Add entry</button>
    </div>
  </div>
  <div class="metrics" id="metrics"></div>
  <div class="chart-card">
    <div class="chart-title">Monthly income vs expenditure</div>
    <div style="position:relative;width:100%;height:220px"><canvas id="barChart"></canvas></div>
  </div>
  <div class="bottom-grid">
    <div class="chart-card">
      <div class="chart-title">Expenditure by category</div>
      <div id="cat-breakdown"></div>
    </div>
    <div class="chart-card">
      <div class="chart-title">Monthly profit / loss</div>
      <div style="position:relative;width:100%;height:170px"><canvas id="profitChart"></canvas></div>
    </div>
  </div>
  <div class="card" style="margin-top:1rem">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px">
      <div class="section-label" style="margin:0;border:none;padding:0">Recent entries</div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <select id="filter-type" onchange="renderEntries()" style="font-size:12px;padding:5px 10px;border-radius:var(--radius);border:1px solid var(--border2);background:#fff;color:var(--ink);font-family:'Jost',sans-serif">
          <option value="all">All entries</option>
          <option value="income">Income only</option>
          <option value="expense">Expenses only</option>
        </select>
        <button class="btn btn-sm" onclick="exportCSV(getFiltered(),'quinta_finance')">Export CSV</button>
        <label class="btn btn-sm" style="cursor:pointer">Import CSV<input type="file" accept=".csv" onchange="importCSV(this)" style="display:none"></label>
      </div>
    </div>
    <div id="entries-list"><div class="empty">Loading…</div></div>
  </div>
</div>
<button class="fab" onclick="openModal()">+</button>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h2 id="modal-h">Add entry</h2>
    <div class="two-col">
      <div class="fg"><label>Type</label><select id="m-etype"><option value="income">Income</option><option value="expense">Expense</option></select></div>
      <div class="fg"><label>Date</label><input type="date" id="m-date"></div>
    </div>
    <div class="fg"><label>Category</label>
      <select id="m-cat">
        <option value="Wedding fee">Wedding fee</option><option value="Airbnb fee">Airbnb fee</option>
        <option value="Property maintenance">Property maintenance</option>
        <option value="Cleaning & housekeeping">Cleaning &amp; housekeeping</option>
        <option value="Utilities">Utilities</option><option value="Staff & labour">Staff &amp; labour</option>
        <option value="Equipment & furniture">Equipment &amp; furniture</option><option value="Other">Other</option>
      </select>
    </div>
    <div class="fg"><label>Description</label><input type="text" id="m-desc" placeholder="e.g. Electricity bill March"></div>
    <div class="fg"><label>Amount (R$)</label><input type="number" id="m-amount" placeholder="0,00" min="0" step="0.01"></div>
    <div class="fg"><label>Notes (optional)</label><textarea id="m-notes" style="min-height:60px"></textarea></div>
    <div class="modal-actions">
      <button class="btn btn-sm btn-danger" id="del-btn" onclick="deleteEntry()" style="display:none">Delete</button>
      <button class="btn btn-sm" onclick="closeModal()">Cancel</button>
      <button class="btn btn-dark btn-sm" onclick="saveEntry()">Save</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="export.js"></script>
<script src="nav.js"></script><script src="config.js"></script><script src="shared.js"></script>
<script>
renderNav('finance');
const MS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const YEARS=[2024,2025,2026];
let curYear=new Date().getFullYear(), editId=null, entries=[];

function fmt(n){return'R$ '+Number(n).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});}

async function load(){
  const res=await api('getAll','finance');
  if(res._demo) document.getElementById('demo-bar').style.display='block';
  entries=(res.rows||[]);
  renderAll();
}

function getFiltered(){return entries.filter(e=>new Date((e.date||'2000-01-01')+'T12:00:00').getFullYear()===curYear);}

function renderYears(){
  document.getElementById('year-sel').innerHTML=YEARS.map(y=>`<button class="yb${y===curYear?' active':''}" onclick="setYear(${y})">${y}</button>`).join('');
}
function setYear(y){curYear=y;renderAll();renderYears();}

function renderMetrics(){
  const f=getFiltered();
  const tI=f.filter(e=>e.type==='income').reduce((s,e)=>s+Number(e.amount),0);
  const tE=f.filter(e=>e.type==='expense').reduce((s,e)=>s+Number(e.amount),0);
  const profit=tI-tE;
  const m=new Date().getMonth();
  const mE=f.filter(e=>new Date((e.date||'2000-01-01')+'T12:00:00').getMonth()===m);
  const mP=mE.filter(e=>e.type==='income').reduce((s,e)=>s+Number(e.amount),0)-mE.filter(e=>e.type==='expense').reduce((s,e)=>s+Number(e.amount),0);
  document.getElementById('metrics').innerHTML=`
    <div class="metric"><div class="metric-label">Total income</div><div class="metric-val" style="font-size:18px;color:var(--green)">${fmt(tI)}</div></div>
    <div class="metric"><div class="metric-label">Total expenses</div><div class="metric-val" style="font-size:18px;color:var(--red)">${fmt(tE)}</div></div>
    <div class="metric"><div class="metric-label">Net profit/loss</div><div class="metric-val" style="font-size:18px;color:${profit>=0?'var(--green)':'var(--red)'}">${fmt(profit)}</div></div>
    <div class="metric"><div class="metric-label">This month</div><div class="metric-val" style="font-size:18px;color:${mP>=0?'var(--green)':'var(--red)'}">${fmt(mP)}</div></div>`;
}

let barC,profitC;
function renderCharts(){
  const f=getFiltered();
  const iByM=Array(12).fill(0), eByM=Array(12).fill(0);
  f.forEach(e=>{const m=new Date((e.date||'2000-01-01')+'T12:00:00').getMonth();e.type==='income'?iByM[m]+=Number(e.amount):eByM[m]+=Number(e.amount);});
  const pByM=iByM.map((v,i)=>v-eByM[i]);
  if(barC)barC.destroy();
  barC=new Chart(document.getElementById('barChart'),{type:'bar',data:{labels:MS,datasets:[{label:'Income',data:iByM,backgroundColor:'#1e3a00',borderRadius:3},{label:'Expenses',data:eByM,backgroundColor:'#8a2020',borderRadius:3}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>' '+fmt(c.raw)}}},scales:{x:{stacked:false,grid:{display:false},ticks:{font:{size:10},color:'#6b7a50'}},y:{grid:{color:'rgba(0,0,0,0.05)'},ticks:{font:{size:10},color:'#6b7a50',callback:v=>'R$'+Math.round(v/1000)+'k'}}}}});
  if(profitC)profitC.destroy();
  profitC=new Chart(document.getElementById('profitChart'),{type:'bar',data:{labels:MS,datasets:[{label:'Profit/Loss',data:pByM,backgroundColor:pByM.map(v=>v>=0?'rgba(30,58,0,0.7)':'rgba(138,32,32,0.7)'),borderRadius:3}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>' '+fmt(c.raw)}}},scales:{x:{grid:{display:false},ticks:{font:{size:10},color:'#6b7a50'}},y:{grid:{color:'rgba(0,0,0,0.05)'},ticks:{font:{size:10},color:'#6b7a50',callback:v=>'R$'+Math.round(v/1000)+'k'}}}}});
}

function renderCatBreakdown(){
  const f=getFiltered().filter(e=>e.type==='expense');
  const bycat={};f.forEach(e=>{bycat[e.cat]=(bycat[e.cat]||0)+Number(e.amount);});
  const sorted=Object.entries(bycat).sort((a,b)=>b[1]-a[1]);
  const max=sorted[0]?.[1]||1;
  document.getElementById('cat-breakdown').innerHTML=sorted.length
    ?sorted.map(([cat,val])=>`<div class="cat-row"><div style="flex:1"><div style="font-size:12px;color:var(--ink2)">${cat}</div><div class="bar-wrap"><div class="bar-fill" style="width:${Math.round(val/max*100)}%;background:var(--red)"></div></div></div><div style="font-size:12px;font-weight:500;margin-left:10px;white-space:nowrap">${fmt(val)}</div></div>`).join('')
    :'<div class="empty">No expenses yet</div>';
}

function renderEntries(){
  const fv=document.getElementById('filter-type').value;
  let list=getFiltered();
  if(fv!=='all')list=list.filter(e=>e.type===fv);
  list.sort((a,b)=>String(b.date).localeCompare(String(a.date)));
  const el=document.getElementById('entries-list');
  if(!list.length){el.innerHTML='<div class="empty">No entries yet</div>';return;}
  el.innerHTML=list.map(e=>`<div class="entry-row">
    <div class="entry-dot" style="background:${e.type==='income'?'var(--green)':'var(--red)'}"></div>
    <div class="entry-info"><div class="entry-name">${e.desc}</div><div class="entry-meta">${e.cat} · ${new Date((e.date||'2000-01-01')+'T12:00:00').toLocaleDateString('pt-BR')}</div></div>
    <div class="entry-amt ${e.type}">${e.type==='expense'?'−':'+'} ${fmt(Number(e.amount))}</div>
    <button class="btn btn-sm" style="margin-left:8px" onclick="openModal('${e.id}')">Edit</button>
  </div>`).join('');
}

function openModal(id){
  editId=id||null;
  document.getElementById('modal-h').textContent=id?'Edit entry':'Add entry';
  document.getElementById('del-btn').style.display=id?'inline-block':'none';
  if(id){const e=entries.find(x=>String(x.id)===String(id));document.getElementById('m-etype').value=e.type;document.getElementById('m-cat').value=e.cat;document.getElementById('m-desc').value=e.desc;document.getElementById('m-amount').value=e.amount;document.getElementById('m-date').value=e.date;document.getElementById('m-notes').value=e.notes||'';}
  else{['m-desc','m-notes'].forEach(i=>document.getElementById(i).value='');document.getElementById('m-amount').value='';document.getElementById('m-date').value=new Date().toISOString().split('T')[0];document.getElementById('m-etype').value='income';document.getElementById('m-cat').value='Wedding fee';}
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal(){document.getElementById('modal-overlay').classList.remove('open');editId=null;}

async function saveEntry(){
  document.getElementById('loader').classList.add('show');
  const e={id:editId||genId('f'),type:document.getElementById('m-etype').value,cat:document.getElementById('m-cat').value,desc:document.getElementById('m-desc').value.trim()||'Entry',amount:parseFloat(document.getElementById('m-amount').value)||0,date:document.getElementById('m-date').value||new Date().toISOString().split('T')[0],notes:document.getElementById('m-notes').value.trim()};
  if(editId) await api('update','finance',e); else await api('add','finance',e);
  await load(); closeModal();
  document.getElementById('loader').classList.remove('show');
}

async function deleteEntry(){
  if(!editId||!confirm('Delete this entry?'))return;
  document.getElementById('loader').classList.add('show');
  await api('delete','finance',{id:editId});
  await load(); closeModal();
  document.getElementById('loader').classList.remove('show');
}

async function importCSV(input){
  const file=input.files[0];if(!file)return;
  const text=await file.text();
  const lines=text.split('\n').filter(l=>l.trim());
  document.getElementById('loader').classList.add('show');
  let added=0;
  for(const line of lines.slice(1)){
    const cols=line.split(',').map(c=>c.trim().replace(/^"|"$/g,''));
    if(cols.length<4)continue;
    const[type,cat,desc,amount,date,notes]=cols;
    if(!amount||isNaN(parseFloat(amount)))continue;
    await api('add','finance',{id:genId('f'),type:(type||'expense').toLowerCase(),cat:cat||'Other',desc:desc||'Imported',amount:parseFloat(amount)||0,date:date||new Date().toISOString().split('T')[0],notes:notes||''});
    added++;
  }
  await load();
  document.getElementById('loader').classList.remove('show');
  alert(added+' entries imported.');
  input.value='';
}

function renderAll(){renderMetrics();renderCharts();renderCatBreakdown();renderEntries();}
document.getElementById('modal-overlay').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal();});
renderYears(); load();
</script>
</body></html>
