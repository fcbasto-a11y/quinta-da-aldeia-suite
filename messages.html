<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Quinta da Aldeia — Messages</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    .tabs { display:flex; gap:0; margin-bottom:1.5rem; border-bottom:1px solid var(--border); }
    .tab { font-size:11px; letter-spacing:0.07em; text-transform:uppercase; padding:8px 18px; border:none; background:transparent; color:var(--ink3); cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-1px; }
    .tab:hover { color:var(--ink); }
    .tab.active { color:var(--ink); border-bottom-color:var(--ink); }
    .panel { display:none; } .panel.active { display:block; }
    .two-col { display:grid; grid-template-columns:1fr 1fr; gap:1.25rem; }
    @media(max-width:640px) { .two-col { grid-template-columns:1fr; } }
    .preview-box { background:var(--cream2); border:1px solid var(--border); border-radius:var(--radius); padding:1rem 1.25rem; font-size:13px; font-weight:300; line-height:1.75; white-space:pre-wrap; min-height:140px; color:var(--ink); }
    .tag-btn { display:inline-block; font-size:11px; padding:3px 10px; border-radius:20px; background:var(--blue-bg); color:var(--blue); cursor:pointer; margin:2px; border:none; font-family:'Jost',sans-serif; }
    .tag-btn:hover { opacity:0.8; }
    .copy-confirm { font-size:11px; color:var(--green); margin-left:8px; display:none; }
    .saved-row { display:flex; align-items:center; justify-content:space-between; padding:10px 0; border-bottom:1px solid var(--border); font-size:13px; }
    .saved-row:last-child { border-bottom:none; }
    .subject-preview { font-size:11px; color:var(--ink3); margin-bottom:8px; }
    .subject-preview strong { color:var(--ink); font-weight:400; }
  </style>
</head>
<body>
<script src="auth.js"></script>
<div id="nav-placeholder"></div>
<div class="page">
  <div class="page-header"><h1>Message Templates</h1><p>Craft and copy auto-reply messages for WhatsApp and email</p></div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('whatsapp',this)">WhatsApp</button>
    <button class="tab" onclick="switchTab('email',this)">Email</button>
    <button class="tab" onclick="switchTab('saved',this)">Saved</button>
  </div>

  <div class="panel active" id="panel-whatsapp">
    <div class="two-col">
      <div>
        <div class="card" style="margin-bottom:1rem">
          <div class="section-label">Customer details</div>
          <div class="fg"><label>Name</label><input id="wa-name" placeholder="Ana Silva" oninput="renderWA()"></div>
          <div class="fg"><label>Event type</label>
            <select id="wa-type" onchange="renderWA()"><option value="wedding">Wedding</option><option value="airbnb">Airbnb stay</option><option value="event">Private event</option></select>
          </div>
          <div class="fg"><label>Requested date</label><input id="wa-date" placeholder="14 June 2026" oninput="renderWA()"></div>
        </div>
        <div class="card" style="margin-bottom:1rem">
          <div class="section-label" style="margin-bottom:8px">Insert placeholders</div>
          <div>
            <button class="tag-btn" onclick="ins('wa-tpl','[name]')">name</button>
            <button class="tag-btn" onclick="ins('wa-tpl','[date]')">date</button>
            <button class="tag-btn" onclick="ins('wa-tpl','[type]')">event type</button>
            <button class="tag-btn" onclick="ins('wa-tpl','[form_link]')">form link</button>
            <button class="tag-btn" onclick="ins('wa-tpl','[price_range]')">price range</button>
          </div>
        </div>
        <div class="card">
          <div class="section-label">Template</div>
          <div class="fg"><textarea id="wa-tpl" style="min-height:170px" oninput="renderWA()">Olá [name]! 👋

Obrigado por entrar em contacto com a Quinta da Aldeia.

Ficámos muito contentes com o interesse em receber o vosso [type] no dia [date].

Para prepararmos uma proposta personalizada, pedimos que preencham o nosso formulário:
👉 [form_link]

Entraremos em contacto em 24–48 horas com disponibilidade e preços.

Com os melhores cumprimentos,
Equipa Quinta da Aldeia</textarea></div>
        </div>
      </div>
      <div>
        <div class="card">
          <div class="section-label">Preview</div>
          <div class="preview-box" id="wa-preview"></div>
          <div style="display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;align-items:center">
            <button class="btn btn-dark btn-sm" onclick="copyMsg('wa-preview','wa-copied')">Copy message</button>
            <button class="btn btn-sm" onclick="saveTemplate('wa')">Save template</button>
            <span class="copy-confirm" id="wa-copied">Copied!</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="panel" id="panel-email">
    <div class="two-col">
      <div>
        <div class="card" style="margin-bottom:1rem">
          <div class="section-label">Customer details</div>
          <div class="fg"><label>Name</label><input id="em-name" placeholder="João Costa" oninput="renderEM()"></div>
          <div class="fg"><label>Event type</label>
            <select id="em-type" onchange="renderEM()"><option value="wedding">Wedding</option><option value="airbnb">Airbnb stay</option><option value="event">Private event</option></select>
          </div>
          <div class="fg"><label>Subject line</label><input id="em-subj" value="Quinta da Aldeia — the perfect setting for your [type]" oninput="renderEM()"></div>
        </div>
        <div class="card" style="margin-bottom:1rem">
          <div class="section-label" style="margin-bottom:8px">Insert placeholders</div>
          <div>
            <button class="tag-btn" onclick="ins('em-tpl','[name]')">name</button>
            <button class="tag-btn" onclick="ins('em-tpl','[type]')">event type</button>
            <button class="tag-btn" onclick="ins('em-tpl','[form_link]')">form link</button>
            <button class="tag-btn" onclick="ins('em-tpl','[date]')">date</button>
            <button class="tag-btn" onclick="ins('em-tpl','[price_range]')">price range</button>
          </div>
        </div>
        <div class="card">
          <div class="section-label">Template</div>
          <div class="fg"><textarea id="em-tpl" style="min-height:200px" oninput="renderEM()">Dear [name],

Thank you for your enquiry about Quinta da Aldeia. We would be delighted to host your [type] with us.

Our estate offers a beautiful setting for memorable celebrations, with capacity for up to 200 guests, stunning gardens, and full facilities.

To prepare a personalised proposal, please complete our short form:
[form_link]

We will respond within 24–48 hours with availability and pricing.

Warm regards,
Quinta da Aldeia team</textarea></div>
        </div>
      </div>
      <div>
        <div class="card">
          <div class="section-label">Preview</div>
          <div class="subject-preview">Subject: <strong id="em-subj-preview"></strong></div>
          <div class="preview-box" id="em-preview"></div>
          <div style="display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;align-items:center">
            <button class="btn btn-dark btn-sm" onclick="copyMsg('em-preview','em-copied')">Copy message</button>
            <button class="btn btn-sm" onclick="saveTemplate('em')">Save template</button>
            <span class="copy-confirm" id="em-copied">Copied!</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="panel" id="panel-saved">
    <div class="card">
      <div class="section-label">Saved templates</div>
      <div id="saved-list"><div class="empty">No saved templates yet</div></div>
    </div>
  </div>
</div>

<script src="nav.js"></script>
<script src="config.js"></script>
<script>
renderNav('messages');
let saved=[];

function switchTab(id,btn){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('panel-'+id).classList.add('active');
  if(id==='saved') renderSaved();
}

function fill(tpl,name,type,date){
  const tl={wedding:'wedding',airbnb:'Airbnb stay',event:'private event'}[type]||type;
  return tpl.replace(/\[name\]/g,name||'[name]').replace(/\[type\]/g,tl).replace(/\[date\]/g,date||'[date]').replace(/\[form_link\]/g,'https://yoursite.netlify.app/quote.html').replace(/\[price_range\]/g,'€3,000–€8,000');
}

function renderWA(){
  const t=document.getElementById('wa-tpl').value;
  document.getElementById('wa-preview').textContent=fill(t,document.getElementById('wa-name').value.trim(),document.getElementById('wa-type').value,document.getElementById('wa-date').value.trim());
}

function renderEM(){
  const t=document.getElementById('em-tpl').value;
  const name=document.getElementById('em-name').value.trim();
  const type=document.getElementById('em-type').value;
  const tl={wedding:'wedding',airbnb:'Airbnb stay',event:'private event'}[type]||type;
  document.getElementById('em-preview').textContent=fill(t,name,type,'');
  document.getElementById('em-subj-preview').textContent=document.getElementById('em-subj').value.replace(/\[type\]/g,tl).replace(/\[name\]/g,name||'[name]');
}

function ins(id,tag){
  const el=document.getElementById(id);
  const s=el.selectionStart,e=el.selectionEnd;
  el.value=el.value.slice(0,s)+tag+el.value.slice(e);
  el.selectionStart=el.selectionEnd=s+tag.length; el.focus();
  id==='wa-tpl'?renderWA():renderEM();
}

function copyMsg(pid,cid){
  navigator.clipboard.writeText(document.getElementById(pid).textContent).then(()=>{
    const el=document.getElementById(cid); el.style.display='inline';
    setTimeout(()=>el.style.display='none',2000);
  });
}

function saveTemplate(type){
  const isWA=type==='wa';
  saved.push({label:isWA?'WhatsApp':'Email',tpl:document.getElementById(isWA?'wa-tpl':'em-tpl').value,date:new Date().toLocaleDateString('en-GB')});
  alert('Template saved!');
}

function renderSaved(){
  const el=document.getElementById('saved-list');
  if(!saved.length){el.innerHTML='<div class="empty">No saved templates yet</div>';return;}
  el.innerHTML=saved.map((s,i)=>`<div class="saved-row">
    <div><div style="font-size:13px;font-weight:400">${s.label} template</div><div style="font-size:11px;color:var(--ink3)">Saved ${s.date}</div></div>
    <div style="display:flex;gap:6px">
      <button class="btn btn-sm" onclick="loadTpl(${i})">Load</button>
      <button class="btn btn-sm btn-danger" onclick="saved.splice(${i},1);renderSaved()">Delete</button>
    </div>
  </div>`).join('');
}

function loadTpl(i){
  const s=saved[i];
  if(s.label==='WhatsApp'){document.getElementById('wa-tpl').value=s.tpl;switchTab('whatsapp',document.querySelectorAll('.tab')[0]);renderWA();}
  else{document.getElementById('em-tpl').value=s.tpl;switchTab('email',document.querySelectorAll('.tab')[1]);renderEM();}
}

renderWA(); renderEM();
</script>
<script src="config.js"></script><script src="shared.js"></script>
</body>
</html>
