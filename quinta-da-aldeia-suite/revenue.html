<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Quinta da Aldeia — Revenue</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    .year-sel { display:flex; gap:6px; }
    .yb { font-size:11px; letter-spacing:0.06em; text-transform:uppercase; padding:5px 14px; border-radius:20px; border:1px solid var(--border2); background:transparent; color:var(--ink3); cursor:pointer; }
    .yb.active { background:var(--ink); color:var(--cream); border-color:var(--ink); }
    .chart-card { background:#fff; border:1px solid var(--border); border-radius:var(--radius-lg); padding:1.25rem 1.5rem; margin-bottom:1rem; }
    .chart-title { font-size:11px; letter-spacing:0.08em; text-transform:uppercase; color:var(--ink3); margin-bottom:1rem; }
    .legend { display:flex; gap:16px; margin-bottom:12px; flex-wrap:wrap; }
    .li { display:flex; align-items:center; gap:6px; font-size:11px; color:var(--ink2); }
    .ls { width:10px; height:10px; border-radius:2px; }
    .bottom-grid { display:grid; grid-template-columns:1fr 1fr; gap:1rem; }
    @media(max-width:600px) { .bottom-grid { grid-template-columns:1fr; } }
    .breakdown-row { display:flex; align-items:center; justify-content:space-between; padding:8px 0; border-bottom:1px solid var(--border); font-size:13px; }
    .breakdown-row:last-child { border-bottom:none; }
    .bar-wrap { height:5px; background:var(--cream3); border-radius:3px; width:100%; margin-top:3px; }
    .bar-fill { height:5px; border-radius:3px; background:var(--green); }
    .entry-grid { display:grid; grid-template-columns:80px 1fr 1fr 80px; gap:4px; align-items:center; padding:6px 0; border-bottom:1px solid var(--border); font-size:12px; }
    .entry-grid:last-child { border-bottom:none; }
    .entry-hdr { font-size:10px; letter-spacing:0.07em; text-transform:uppercase; color:var(--ink3); padding-bottom:8px; border-bottom:1px solid var(--border); display:grid; grid-template-columns:80px 1fr 1fr 80px; gap:4px; }
    input[type=number].entry-input { padding:4px 8px; font-size:12px; border-radius:var(--radius); border:1px solid var(--border); background:#fff; color:var(--ink); font-family:'Jost',sans-serif; width:100%; }
  </style>
</head>
<body>
<script src="auth.js"></script>
<div id="nav-placeholder"></div>
<div class="page">
  <div class="page-header" style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:1rem">
    <div><h1>Revenue Dashboard</h1><p>Monthly income by event type</p></div>
    <div class="year-sel" id="year-sel"></div>
  </div>

  <div class="metrics" id="metrics"></div>

  <div class="chart-card">
    <div class="chart-title">Monthly revenue</div>
    <div class="legend">
      <div class="li"><div class="ls" style="background:#2d5a1b"></div>Weddings</div>
      <div class="li"><div class="ls" style="background:#1a4a7a"></div>Airbnb</div>
    </div>
    <div style="position:relative;width:100%;height:220px">
      <canvas id="barChart" role="img" aria-label="Monthly revenue bar chart"></canvas>
    </div>
  </div>

  <div class="bottom-grid">
    <div class="chart-card">
      <div class="chart-title">Revenue split</div>
      <div style="position:relative;width:100%;height:170px">
        <canvas id="pieChart" role="img" aria-label="Revenue split donut chart"></canvas>
      </div>
    </div>
    <div class="chart-card">
      <div class="chart-title">Top months</div>
      <div id="breakdown"></div>
    </div>
  </div>

  <div class="chart-card" style="margin-top:1rem">
    <div class="chart-title">Enter monthly figures (€)</div>
    <div class="entry-hdr"><span>Month</span><span>Weddings</span><span>Airbnb</span><span>Total</span></div>
    <div id="entry-rows"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="nav.js"></script>
<script src="config.js"></script>
<script>
renderNav('revenue');
const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const YEARS=[2024,2025,2026];
let curYear=2026;

const data={
  2024:{w:[0,0,2800,0,4500,3200,0,5600,4800,0,2200,0],a:[320,280,410,380,420,510,680,720,590,430,310,290]},
  2025:{w:[0,0,3500,4200,5800,4100,0,6200,5500,3800,0,0],a:[380,350,480,460,510,620,780,850,700,520,390,340]},
  2026:{w:[0,0,0,0,4800,5200,0,0,0,0,0,0],a:[410,390,520,490,540,0,0,0,0,0,0,0]},
};

function fmt(n){return'€'+Math.round(n).toLocaleString();}
function getD(){return data[curYear];}
let barC,pieC;

function renderYears(){
  document.getElementById('year-sel').innerHTML=YEARS.map(y=>`<button class="yb${y===curYear?' active':''}" onclick="setYear(${y})">${y}</button>`).join('');
}
function setYear(y){curYear=y;renderAll();renderYears();}

function renderMetrics(){
  const d=getD();
  const tW=d.w.reduce((a,b)=>a+b,0),tA=d.a.reduce((a,b)=>a+b,0);
  const total=tW+tA;
  const vals=d.w.map((v,i)=>v+d.a[i]);
  const bestIdx=vals.indexOf(Math.max(...vals));
  document.getElementById('metrics').innerHTML=`
    <div class="metric"><div class="metric-label">Total revenue</div><div class="metric-val">${fmt(total)}</div><div class="metric-sub">${curYear}</div></div>
    <div class="metric"><div class="metric-label">Weddings</div><div class="metric-val">${fmt(tW)}</div><div class="metric-sub">${d.w.filter(v=>v>0).length} events</div></div>
    <div class="metric"><div class="metric-label">Airbnb</div><div class="metric-val">${fmt(tA)}</div><div class="metric-sub">${d.a.filter(v=>v>0).length} stays</div></div>
    <div class="metric"><div class="metric-label">Best month</div><div class="metric-val">${Math.max(...vals)>0?MONTHS[bestIdx]:'—'}</div><div class="metric-sub">${Math.max(...vals)>0?fmt(Math.max(...vals)):''}</div></div>
  `;
}

function renderBar(){
  const d=getD();
  if(barC)barC.destroy();
  barC=new Chart(document.getElementById('barChart'),{
    type:'bar',
    data:{labels:MONTHS,datasets:[
      {label:'Weddings',data:d.w,backgroundColor:'#2d5a1b',borderRadius:3},
      {label:'Airbnb',data:d.a,backgroundColor:'#1a4a7a',borderRadius:3}
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>' '+fmt(c.raw)}}},
      scales:{x:{stacked:true,grid:{display:false},ticks:{font:{size:10},color:'#8a8680'}},
              y:{stacked:true,grid:{color:'rgba(0,0,0,0.05)'},ticks:{font:{size:10},color:'#8a8680',callback:v=>'€'+Math.round(v/1000)+'k'}}}}
  });
}

function renderPie(){
  const d=getD();
  const tW=d.w.reduce((a,b)=>a+b,0),tA=d.a.reduce((a,b)=>a+b,0);
  if(pieC)pieC.destroy();
  pieC=new Chart(document.getElementById('pieChart'),{
    type:'doughnut',
    data:{labels:['Weddings','Airbnb'],datasets:[{data:[tW,tA],backgroundColor:['#2d5a1b','#1a4a7a'],borderWidth:0}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>' '+fmt(c.raw)}}},cutout:'62%'}
  });
}

function renderBreakdown(){
  const d=getD();
  const totals=MONTHS.map((m,i)=>({m,v:d.w[i]+d.a[i]})).filter(x=>x.v>0).sort((a,b)=>b.v-a.v).slice(0,5);
  const max=totals[0]?.v||1;
  document.getElementById('breakdown').innerHTML=totals.length
    ?totals.map(t=>`<div class="breakdown-row"><div style="flex:1"><div style="font-size:12px;color:var(--ink2)">${t.m}</div><div class="bar-wrap"><div class="bar-fill" style="width:${Math.round(t.v/max*100)}%"></div></div></div><div style="font-weight:400;font-size:13px;margin-left:12px">${fmt(t.v)}</div></div>`).join('')
    :'<div style="font-size:13px;color:var(--ink3);padding:1rem 0">No data yet</div>';
}

function renderEntries(){
  const d=getD();
  document.getElementById('entry-rows').innerHTML=MONTHS.map((m,i)=>`
    <div class="entry-grid">
      <span style="color:var(--ink3)">${m}</span>
      <input type="number" class="entry-input" value="${d.w[i]||''}" placeholder="0" min="0" onchange="updateVal('w',${i},this.value)">
      <input type="number" class="entry-input" value="${d.a[i]||''}" placeholder="0" min="0" onchange="updateVal('a',${i},this.value)">
      <span style="font-weight:400">${(d.w[i]+d.a[i])>0?fmt(d.w[i]+d.a[i]):'—'}</span>
    </div>`).join('');
}

function updateVal(type,idx,val){data[curYear][type][idx]=parseFloat(val)||0;renderAll();}

function renderAll(){renderMetrics();renderBar();renderPie();renderBreakdown();renderEntries();}

renderYears();renderAll();
</script>
<button class="fab" onclick="openAddModal()" style="display:none"></button>
</body>
</html>
