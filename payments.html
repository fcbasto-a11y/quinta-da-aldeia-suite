<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Quinta da Aldeia — Payments</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    .filters{display:flex;gap:6px;margin-bottom:1.25rem;flex-wrap:wrap}
    .fb{font-size:11px;letter-spacing:0.06em;text-transform:uppercase;padding:5px 14px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--ink3);cursor:pointer}
    .fb.active{background:var(--ink);color:var(--cream);border-color:var(--ink)}
    .prog{height:5px;background:var(--cream3);border-radius:3px;overflow:hidden;margin-top:3px}
    .prog-f{height:5px;border-radius:3px;background:var(--green)}
    .inst-wrap{margin-top:10px;padding:10px 12px;background:var(--cream2);border-radius:var(--radius)}
    .inst-title{font-size:10px;letter-spacing:0.07em;text-transform:uppercase;color:var(--ink3);margin-bottom:6px}
    .inst-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px}
    .inst-row:last-child{border-bottom:none}
    .inst-num{width:20px;color:var(--ink3);font-size:11px;flex-shrink:0}
    .inst-date{flex:1;color:var(--ink2)}
    .inst-amt{font-weight:500;color:var(--ink);margin-right:6px;white-space:nowrap}
    .inst-cb{accent-color:var(--green);width:14px;height:14px;cursor:pointer;flex-shrink:0}
    .inst-overdue{color:var(--red)}
    .mode-toggle{display:flex;gap:6px;margin-bottom:1rem;flex-wrap:wrap}
    .mt-btn{font-size:11px;padding:5px 14px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--ink3);cursor:pointer}
    .mt-btn.active{background:var(--ink2);color:#fff;border-color:var(--ink2)}
    .inst-form-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:6px}
    .inst-form-row input{width:100%;padding:7px 9px;border:1px solid var(--border2);border-radius:var(--radius);background:#fff;color:var(--ink);font-family:'Jost',sans-serif;font-size:12px}
    .inst-add-btn{font-size:11px;color:var(--ink2);background:transparent;border:1px dashed var(--border2);border-radius:var(--radius);padding:5px 12px;cursor:pointer;margin-top:4px;width:100%}
    .loading-overlay{display:none;position:fixed;inset:0;background:rgba(250,248,243,0.8);z-index:300;align-items:center;justify-content:center;font-size:14px;color:var(--ink3)}
    .loading-overlay.show{display:flex}
    .demo-bar{background:#fffbea;border:1px solid #c8b840;border-radius:var(--radius);padding:10px 16px;margin-bottom:1rem;font-size:12px;color:#7a6800;display:none}
  </style>
</head>
<body>
<script src="auth.js"></script>
<div id="nav-placeholder"></div>
<div class="loading-overlay" id="loader">Saving…</div>
<div class="page">
  <div class="demo-bar" id="demo-bar">⚙️ Running in demo mode — data will not persist. Add your Apps Script URL to config.js to enable live storage.</div>
  <div class="page-header">
    <div class="page-header-left"><h1>Payment Tracker</h1><p>Deposits, balances and instalment plans</p></div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn btn-sm" onclick="exportPaymentsCSV()">Export CSV</button>
      <button class="btn btn-dark" onclick="openModal()">+ Add booking</button>
    </div>
  </div>
  <div class="metrics" id="metrics"></div>
  <div class="filters">
    <button class="fb active" onclick="setFilter('all',this)">All</button>
    <button class="fb" onclick="setFilter('overdue',this)">Overdue</button>
    <button class="fb" onclick="setFilter('pending',this)">Pending</button>
    <button class="fb" onclick="setFilter('paid',this)">Fully paid</button>
    <button class="fb" onclick="setFilter('instalments',this)">Instalments</button>
  </div>
  <div id="bookings-list"><div class="empty">Loading…</div></div>
</div>
<button class="fab" onclick="openModal()">+</button>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h2 id="modal-h">Add booking</h2>
    <div class="fg"><label>Customer name</label><input id="m-name" placeholder="Ana & João"></div>
    <div class="two-col">
      <div class="fg"><label>Event type</label><select id="m-type"><option>Wedding</option><option>Airbnb</option><option>Other</option></select></div>
      <div class="fg"><label>Event date</label><input type="date" id="m-date"></div>
    </div>
    <div class="two-col">
      <div class="fg"><label>Contact email</label><input type="email" id="m-email" placeholder="email@exemplo.com"></div>
      <div class="fg"><label>Total value (R$)</label><input type="number" id="m-total" placeholder="5000" min="0" onchange="genInstalments()"></div>
    </div>
    <div class="fg"><label>Payment mode</label>
      <div class="mode-toggle">
        <button class="mt-btn active" id="mode-standard" onclick="setMode('standard')">Standard</button>
        <button class="mt-btn" id="mode-instalment" onclick="setMode('instalment')">Instalments</button>
      </div>
    </div>
    <div id="standard-fields">
      <div class="two-col">
        <div class="fg"><label>Deposit status</label><select id="m-dep"><option value="pending">Pending</option><option value="paid">Paid</option><option value="overdue">Overdue</option></select></div>
        <div class="fg"><label>Deposit due date</label><input type="date" id="m-dep-due"></div>
      </div>
      <div class="two-col">
        <div class="fg"><label>Balance status</label><select id="m-fin"><option value="na">Not yet due</option><option value="pending">Pending</option><option value="paid">Paid</option><option value="overdue">Overdue</option></select></div>
        <div class="fg"><label>Balance due date</label><input type="date" id="m-fin-due"></div>
      </div>
    </div>
    <div id="instalment-fields" style="display:none">
      <div class="two-col">
        <div class="fg"><label>Number of instalments (max 10)</label><input type="number" id="m-inst-count" min="1" max="10" value="3" onchange="genInstalments()"></div>
        <div class="fg"><label>Split type</label><select id="m-inst-type" onchange="genInstalments()"><option value="equal">Equal amounts</option><option value="custom">Custom amounts</option></select></div>
      </div>
      <div id="inst-rows"></div>
      <button class="inst-add-btn" onclick="addInstalment()" id="add-inst-btn" style="display:none">+ Add instalment</button>
    </div>
    <div class="modal-actions">
      <button class="btn btn-sm" onclick="closeModal()">Cancel</button>
      <button class="btn btn-dark btn-sm" onclick="saveBooking()">Save</button>
    </div>
  </div>
</div>

<script src="export.js"></script>
<script src="nav.js"></script><script src="config.js"></script><script src="shared.js"></script>
<script>
renderNav('payments');
let filter='all', editId=null, payMode='standard';
let payments=[], instalments=[];

function fmt(n){return'R$ '+Number(n).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fmtD(s){if(!s)return'—';try{return new Date(s+'T12:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short'});}catch(e){return s;}}
function badge(s){const m={paid:'badge-green Paid',pending:'badge-amber Pending',overdue:'badge-red Overdue',na:'badge-gray —'};const[c,l]=(m[s]||'badge-gray —').split(' ');return`<span class="badge ${c}">${l}</span>`;}

function overallStatus(p){
  const today=new Date().toISOString().split('T')[0];
  if(p.mode==='instalment'){
    const insts=instalments.filter(i=>String(i.booking_id)===String(p.id));
    if(insts.some(i=>String(i.paid)!=='true'&&i.due_date<today))return'overdue';
    if(insts.length&&insts.every(i=>String(i.paid)==='true'))return'paid';
    return'pending';
  }
  if(p.dep_status==='overdue'||p.fin_status==='overdue')return'overdue';
  if(p.fin_status==='paid')return'paid';
  return'pending';
}

function paidAmt(p){
  if(p.mode==='instalment'){
    return instalments.filter(i=>String(i.booking_id)===String(p.id)&&String(i.paid)==='true').reduce((s,i)=>s+Number(i.amount),0);
  }
  return(p.dep_status==='paid'?Number(p.total)*0.3:0)+(p.fin_status==='paid'?Number(p.total)*0.7:0);
}

async function load(){
  const [pr, ir] = await Promise.all([api('getAll','payments'), api('getAll','instalments')]);
  if(pr._demo) document.getElementById('demo-bar').style.display='block';
  payments   = (pr.rows||[]);
  instalments= (ir.rows||[]);
  renderMetrics(); renderList();
}

function renderMetrics(){
  const rec=payments.reduce((s,p)=>s+paidAmt(p),0);
  const out=payments.reduce((s,p)=>s+(Number(p.total)-paidAmt(p)),0);
  const ov=payments.filter(p=>overallStatus(p)==='overdue').length;
  const fp=payments.filter(p=>overallStatus(p)==='paid').length;
  document.getElementById('metrics').innerHTML=`
    <div class="metric"><div class="metric-label">Received</div><div class="metric-val" style="font-size:18px">${fmt(rec)}</div></div>
    <div class="metric"><div class="metric-label">Outstanding</div><div class="metric-val" style="font-size:18px">${fmt(out)}</div></div>
    <div class="metric"><div class="metric-label">Overdue</div><div class="metric-val" style="font-size:18px;color:${ov?'var(--red)':'inherit'}">${ov}</div></div>
    <div class="metric"><div class="metric-label">Fully paid</div><div class="metric-val" style="font-size:18px">${fp}</div></div>`;
}

function renderList(){
  const today=new Date().toISOString().split('T')[0];
  let list=[...payments];
  if(filter==='overdue')list=list.filter(p=>overallStatus(p)==='overdue');
  else if(filter==='pending')list=list.filter(p=>overallStatus(p)==='pending');
  else if(filter==='paid')list=list.filter(p=>overallStatus(p)==='paid');
  else if(filter==='instalments')list=list.filter(p=>p.mode==='instalment');
  list.sort((a,b)=>String(a.event_date).localeCompare(String(b.event_date)));
  const el=document.getElementById('bookings-list');
  if(!list.length){el.innerHTML='<div class="empty">No payment records found</div>';return;}
  el.innerHTML=list.map(p=>{
    const paid=paidAmt(p); const total=Number(p.total);
    const pct=total>0?Math.round(paid/total*100):0;
    const os=overallStatus(p);
    let payHtml='';
    if(p.mode==='instalment'){
      const insts=instalments.filter(i=>String(i.booking_id)===String(p.id)).sort((a,b)=>Number(a.instalment_num)-Number(b.instalment_num));
      const rows=insts.map(inst=>{
        const ov2=String(inst.paid)!=='true'&&inst.due_date<today;
        return`<div class="inst-row"><span class="inst-num">${inst.instalment_num}</span><span class="inst-date${ov2?' inst-overdue':''}">${fmtD(inst.due_date)}${ov2?' ⚠️':''}</span><span class="inst-amt">${fmt(Number(inst.amount))}</span><input type="checkbox" class="inst-cb"${String(inst.paid)==='true'?' checked':''} onchange="toggleInst('${inst.id}','${p.id}',this.checked)"></div>`;
      }).join('');
      const paidCount=insts.filter(i=>String(i.paid)==='true').length;
      payHtml=`<div class="inst-wrap"><div class="inst-title">Instalments — ${paidCount}/${insts.length} paid</div>${rows||'<div style="font-size:12px;color:var(--ink3)">No instalments added yet</div>'}</div>`;
    } else {
      payHtml=`<div style="margin-top:8px;display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:12px">
        <div>Deposit (30%): ${badge(p.dep_status)}<div style="font-size:10px;color:var(--ink3);margin-top:2px">${fmt(total*0.3)}${p.dep_due?' · '+fmtD(p.dep_due):''}</div></div>
        <div>Balance (70%): ${badge(p.fin_status)}<div style="font-size:10px;color:var(--ink3);margin-top:2px">${fmt(total*0.7)}${p.fin_due?' · '+fmtD(p.fin_due):''}</div></div>
      </div>`;
    }
    return`<div class="card" style="margin-bottom:1rem">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:8px">
        <div><div style="font-size:15px;font-weight:400">${p.name}</div><div style="font-size:11px;color:var(--ink3);margin-top:2px">${p.type} · ${fmtD(p.event_date)}</div></div>
        <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">${badge(os)}<span class="badge ${p.mode==='instalment'?'badge-blue':'badge-gray'}">${p.mode==='instalment'?'Instalments':'Standard'}</span><button class="btn btn-sm" onclick="openModal('${p.id}')">Edit</button></div>
      </div>
      <div style="margin-top:10px"><div style="display:flex;justify-content:space-between;font-size:11px;color:var(--ink3);margin-bottom:4px"><span>${fmt(paid)} of ${fmt(total)}</span><span>${pct}%</span></div><div class="prog"><div class="prog-f" style="width:${pct}%"></div></div></div>
      ${payHtml}
    </div>`;
  }).join('');
}

async function toggleInst(instId, paymentId, checked){
  document.getElementById('loader').classList.add('show');
  await api('update','instalments',{id:instId, paid: checked?'true':'false'});
  await load();
  document.getElementById('loader').classList.remove('show');
}

function setFilter(f,btn){filter=f;document.querySelectorAll('.fb').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderList();}

function setMode(m){
  payMode=m;
  document.getElementById('mode-standard').classList.toggle('active',m==='standard');
  document.getElementById('mode-instalment').classList.toggle('active',m==='instalment');
  document.getElementById('standard-fields').style.display=m==='standard'?'block':'none';
  document.getElementById('instalment-fields').style.display=m==='instalment'?'block':'none';
  if(m==='instalment')genInstalments();
}

function genInstalments(){
  if(payMode!=='instalment')return;
  const count=Math.min(10,Math.max(1,parseInt(document.getElementById('m-inst-count').value)||3));
  const total=parseFloat(document.getElementById('m-total').value)||0;
  const isCustom=document.getElementById('m-inst-type').value==='custom';
  const eq=total>0?Math.round(total/count*100)/100:0;
  document.getElementById('add-inst-btn').style.display=isCustom?'block':'none';
  document.getElementById('inst-rows').innerHTML=Array.from({length:count},(_,i)=>`
    <div class="inst-form-row" id="irow-${i}">
      <input type="date" id="idate-${i}">
      <input type="number" id="iamt-${i}" value="${isCustom?'':eq}" placeholder="R$ amount" min="0" step="0.01"${isCustom?'':' readonly style="background:var(--cream2)"'}>
    </div>`).join('');
}

function addInstalment(){
  const count=document.getElementById('inst-rows').querySelectorAll('.inst-form-row').length;
  if(count>=10)return;
  const div=document.createElement('div');div.className='inst-form-row';div.id=`irow-${count}`;
  div.innerHTML=`<input type="date" id="idate-${count}"><input type="number" id="iamt-${count}" placeholder="R$ amount" min="0" step="0.01">`;
  document.getElementById('inst-rows').appendChild(div);
}

function openModal(id){
  editId=id||null;
  document.getElementById('modal-h').textContent=id?'Edit booking':'Add booking';
  if(id){
    const p=payments.find(x=>String(x.id)===String(id));
    document.getElementById('m-name').value=p.name;document.getElementById('m-type').value=p.type;
    document.getElementById('m-date').value=p.event_date;document.getElementById('m-total').value=p.total;
    document.getElementById('m-email').value=p.email||'';
    setMode(p.mode||'standard');
    if(p.mode==='instalment'){
      const insts=instalments.filter(i=>String(i.booking_id)===String(id)).sort((a,b)=>Number(a.instalment_num)-Number(b.instalment_num));
      document.getElementById('m-inst-count').value=insts.length||3;
      document.getElementById('m-inst-type').value='custom';
      genInstalments();
      insts.forEach((inst,i)=>{
        const di=document.getElementById(`idate-${i}`);const ai=document.getElementById(`iamt-${i}`);
        if(di)di.value=inst.due_date;
        if(ai){ai.value=inst.amount;ai.removeAttribute('readonly');ai.style.background='#fff';}
      });
    } else {
      document.getElementById('m-dep').value=p.dep_status||'pending';
      document.getElementById('m-dep-due').value=p.dep_due||'';
      document.getElementById('m-fin').value=p.fin_status||'na';
      document.getElementById('m-fin-due').value=p.fin_due||'';
    }
  } else {
    ['m-name','m-email','m-dep-due','m-fin-due'].forEach(i=>document.getElementById(i).value='');
    document.getElementById('m-date').value='';document.getElementById('m-total').value='';
    document.getElementById('m-dep').value='pending';document.getElementById('m-fin').value='na';
    setMode('standard');
  }
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal(){document.getElementById('modal-overlay').classList.remove('open');editId=null;}

async function saveBooking(){
  document.getElementById('loader').classList.add('show');
  const pId = editId || genId('p');
  const p = {
    id:pId, name:document.getElementById('m-name').value.trim()||'Unnamed',
    type:document.getElementById('m-type').value, event_date:document.getElementById('m-date').value,
    total:parseFloat(document.getElementById('m-total').value)||0,
    email:document.getElementById('m-email').value.trim(), mode:payMode,
    dep_status:'na', dep_due:'', fin_status:'na', fin_due:''
  };
  if(payMode==='standard'){
    p.dep_status=document.getElementById('m-dep').value; p.dep_due=document.getElementById('m-dep-due').value;
    p.fin_status=document.getElementById('m-fin').value; p.fin_due=document.getElementById('m-fin-due').value;
  }
  if(editId) await api('update','payments',p); else await api('add','payments',p);

  if(payMode==='instalment'){
    // Delete old instalments for this booking then re-add
    const old=instalments.filter(i=>String(i.booking_id)===String(pId));
    await Promise.all(old.map(i=>api('delete','instalments',{id:i.id})));
    const rows=document.getElementById('inst-rows').querySelectorAll('.inst-form-row');
    const newInsts=Array.from(rows).map((row,i)=>({
      id:genId('i'), booking_id:pId,
      customer_name:p.name, email:p.email,
      instalment_num:i+1,
      due_date:document.getElementById(`idate-${i}`)?.value||'',
      amount:parseFloat(document.getElementById(`iamt-${i}`)?.value)||0,
      paid:'false'
    })).filter(inst=>inst.due_date&&inst.amount>0);
    await Promise.all(newInsts.map(inst=>api('add','instalments',inst)));
  }

  await load();
  closeModal();
  document.getElementById('loader').classList.remove('show');
}

document.getElementById('modal-overlay').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal();});
function exportPaymentsCSV(){
  const rows = payments.map(p=>({
    name:p.name, type:p.type, date:p.event_date, total:p.total,
    mode:p.mode, paid:paidAmt(p), outstanding:Number(p.total)-paidAmt(p),
    status:overallStatus(p), email:p.email
  }));
  exportCSV(rows,'quinta_payments');
}
load();
</script>
</body></html>
